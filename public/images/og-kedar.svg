<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Kedar Mane | Data Science &amp; Machine Learning</title>
  <desc id="desc">Branded Open Graph social share image for Kedar Mane portfolio.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <circle cx="180" cy="120" r="150" fill="#2563eb" opacity="0.28" filter="url(#blurGlow)" />
  <circle cx="1030" cy="520" r="190" fill="#0ea5e9" opacity="0.20" filter="url(#blurGlow)" />

  <rect x="90" y="80" width="1020" height="470" rx="28" fill="#0f172a" opacity="0.76" stroke="#334155" />

  <rect x="130" y="130" width="340" height="340" rx="22" fill="#111827" stroke="#374151" />
  <text x="300" y="290" fill="#93c5fd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="82" font-weight="700" text-anchor="middle">KM</text>

  <text x="520" y="230" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="700">Kedar Mane</text>
  <text x="520" y="290" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="500">Data Science &amp; Machine Learning</text>

  <rect x="520" y="335" width="460" height="8" rx="4" fill="url(#accent)" />

  <text x="520" y="405" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28">NLP • Computer Vision • Predictive Analytics</text>
  <text x="520" y="452" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">kedarmane.me</text>
</svg>